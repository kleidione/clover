<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clover Changelog</title>
    <style>
        body {
            background-color: #121212;
            color: #E0E0E0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 15px 50px 15px;
            line-height: 1.6;
        }

        .update-title {
            color: #FFFFFF;
            font-size: 1.3em;
            font-weight: 600;
            margin-top: 25px;
            margin-bottom: 10px;
            border-bottom: 1px solid #303030;
            padding-bottom: 5px;
        }

        .changelist {
            list-style: none;
            padding-left: 0;
            margin-bottom: 30px;
            font-size: 1.0em;
        }
        
        .changelist li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .changelist li::before {
            content: "•";
            color: #81C784;
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: -1em;
        }
    </style>
</head>
<body>
    
    <div class="update-title">8 December 2025</div>
    <ul class="changelist">
        <li>Fixed long-press power button to toggle flashlight</li>
        <li>Added Wi-Fi timeout</li>
        <li>Added Bluetooth timeout</li>
        <li>Updated pt-BR translation</li>
        <li>Stability improvements</li>
    </ul>

    <div class="update-title">5 December 2025</div>
    <ul class="changelist">
        <li>Synced with the latest source changes</li>
        <li>Let's bump to v3.5</li>
        <li>Fix OTA Updater</li>
    </ul>

</body>
</html>
